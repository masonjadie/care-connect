<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>CareConnect Hub | Care & Support at Your Fingertips</title>
  <base href="/">

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description"
    content="CareConnect Hub - Connecting seniors with caregivers, ride booking, and meal delivery services.">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <noscript>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  </noscript>
  <style>
    :root { --bg-app: #f7fafc; --primary-color: #2c5aa0; }
    body { background-color: var(--bg-app); margin: 0; font-family: 'Inter', system-ui, -apple-system, sans-serif; overflow-x: hidden; }
    .nav-skeleton { height: 70px; background: white; border-bottom: 1px solid #e2e8f0; width: 100%; position: fixed; top: 0; z-index: 10; }
    .hero-skeleton { margin-top: 110px; min-height: 750px; width: 100%; max-width: 1600px; margin-inline: auto; display: flex; justify-content: center; align-items: center; padding: 0 40px; box-sizing: border-box; }
    .skeleton-panel { width: 950px; height: 600px; background: #fff; border-radius: 32px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); padding: 60px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    .skeleton-bar { height: 40px; background: #f1f5f9; margin-bottom: 20px; border-radius: 8px; width: 100%; }
    .skeleton-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; margin-top: 20px; }
    .skeleton-btn { height: 50px; background: #f1f5f9; border-radius: 12px; }
  </style>
  <script>
    (function() {
      const savedTheme = localStorage.getItem('careconnect_theme');
      if (savedTheme) {
        document.documentElement.setAttribute('data-theme', savedTheme);
      }
    })();
  </script>
</head>

<body>
  <app-root>
    <!-- Skeleton shown while Angular boots -->
    <div class="nav-skeleton"></div>
    <div class="hero-skeleton">
      <div class="skeleton-panel">
        <div class="skeleton-bar" style="width: 70%; height: 60px; margin-bottom: 30px;"></div>
        <div class="skeleton-bar" style="width: 90%; margin-bottom: 40px;"></div>
        
        <div class="skeleton-grid">
          <div class="skeleton-btn"></div>
          <div class="skeleton-btn"></div>
          <div class="skeleton-btn"></div>
          <div class="skeleton-btn"></div>
          <div class="skeleton-btn"></div>
          <div class="skeleton-btn"></div>
        </div>
      </div>
    </div>
  </app-root>
</body>

</html>
