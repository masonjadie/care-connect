<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>CareConnect Hub | Care & Support at Your Fingertips</title>
  <base href="/">

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description"
    content="CareConnect Hub - Connecting seniors with caregivers, ride booking, and meal delivery services.">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'">

  <style>
    :root {
      --bg-app: #f7fafc;
      --bg-card: #ffffff;
      --bg-navbar: #ffffff;
      --primary-color: #2c5aa0;
      --primary-light: #e6f0ff;
      --secondary-color: #2fb6b6;
      --text-primary: #2d3748;
      --text-muted: #718096;
      --border-color: #e2e8f0;
      --radius-lg: 18px;
    }

    [data-theme='dark'] {
      --bg-app: #121212;
      --bg-card: #1e1e1e;
      --bg-navbar: #1a202c;
      --primary-color: #63b3ed;
      --text-primary: #f7fafc;
      --text-muted: #a0aec0;
      --border-color: #2d3748;
    }

    body {
      background-color: var(--bg-app);
      margin: 0;
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      color: var(--text-primary);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .nav-skeleton { height: 74px; background: var(--bg-navbar); border-bottom: 1px solid var(--border-color); width: 100%; position: sticky; top: 0; z-index: 10; }
    .breadcrumb-skeleton { height: 45px; width: 100%; max-width: 1200px; margin: 15px auto 0; padding: 10px 200px; }
    .hero-skeleton { padding-top: 20px; width: 100%; display: flex; justify-content: center; align-items: flex-start; padding-inline: 40px; box-sizing: border-box; }
    .skeleton-panel { width: 100%; max-width: 950px; min-height: 600px; height: 600px; background: var(--bg-card); border-radius: 32px; box-shadow: 0 20px 60px rgba(0,0,0,0.05); padding: 60px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: flex-start; align-items: center; border: 1px solid var(--border-color); }
    .skeleton-bar { height: 44px; background: var(--bg-app); margin-bottom: 24px; border-radius: 8px; width: 100%; }
    .skeleton-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; margin-top: 30px; }
    .skeleton-btn { height: 60px; background: var(--bg-app); border-radius: 14px; }
  </style>
  <script>
    (function() {
      const savedTheme = localStorage.getItem('careconnect_theme');
      if (savedTheme) {
        document.documentElement.setAttribute('data-theme', savedTheme);
      }
    })();
  </script>
</head>

<body>
  <app-root>
    <!-- Skeleton shown while Angular boots -->
    <div class="nav-skeleton"></div>
    <div class="breadcrumb-skeleton"></div>
    <div class="hero-skeleton">
      <div class="skeleton-panel">
        <div class="skeleton-bar" style="width: 70%; height: 60px; margin-bottom: 30px;"></div>
        <div class="skeleton-bar" style="width: 90%; margin-bottom: 40px;"></div>
        
        <div class="skeleton-grid">
          <div class="skeleton-btn"></div>
          <div class="skeleton-btn"></div>
          <div class="skeleton-btn"></div>
          <div class="skeleton-btn"></div>
          <div class="skeleton-btn"></div>
          <div class="skeleton-btn"></div>
        </div>
      </div>
    </div>
  </app-root>
</body>

</html>
