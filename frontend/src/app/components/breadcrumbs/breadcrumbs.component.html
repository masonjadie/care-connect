<nav aria-label="breadcrumb" class="breadcrumbs-container">
  <ol *ngIf="breadcrumbs.length > 0" class="breadcrumb-list">
    <li *ngFor="let crumb of breadcrumbs; let last = last" class="breadcrumb-item" [class.active]="last">
      <a *ngIf="!last" [routerLink]="crumb.url">{{ crumb.label }}</a>
      <span *ngIf="last" aria-current="page">{{ crumb.label }}</span>
      <span *ngIf="!last" class="separator">/</span>
    </li>
  </ol>
  <div *ngIf="breadcrumbs.length === 0" class="breadcrumb-placeholder" aria-hidden="true"></div>
</nav>
