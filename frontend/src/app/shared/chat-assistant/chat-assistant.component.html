<div class="ai-overlay" [class.active]="isOverlayActive$ | async"></div>

<div class="chat-container">
  <!-- Chat Window -->
  <div class="chat-window" [class.open]="isOpen" aria-live="polite">
    <div class="chat-header">
      <div class="header-info">
        <div class="avatar-container">
          <img src="assets/images/ai-avatar-lady.png" alt="CareConnect Assistant Avatar" class="bot-avatar" width="45" height="45">
          <span class="online-dot"></span>
        </div>
        <div class="header-text">
          <h3>CareConnect AI</h3>
          <span class="status">Online • Ready to help</span>
        </div>
      </div>
      <div class="header-actions">
        <button class="voice-toggle-btn" 
                [class.active]="isVoiceOutputEnabled" 
                (click)="toggleVoiceOutput()" 
                [title]="isVoiceOutputEnabled ? 'Disable Voice Output' : 'Enable Voice Output'"
                aria-label="Toggle Voice Response">
          <span class="icon">{{ isVoiceOutputEnabled ? '🔊' : '🔇' }}</span>
        </button>
        <button class="close-btn" (click)="toggleChat()" aria-label="Close Chat">×</button>
      </div>
    </div>

    <div class="chat-messages" #scrollMe>
      <div *ngFor="let msg of messages$ | async" 
           [class]="'message ' + (msg.sender === 'ai' ? 'ai-msg' : 'user-msg')">
        
        <!-- Avatar for AI Messages -->
        <div class="msg-avatar" *ngIf="msg.sender === 'ai'">
          <img src="assets/images/ai-avatar-lady.png" alt="Assistant" width="32" height="32">
        </div>

        <div class="message-bubble">
          <p>{{ msg.text }}</p>
          
          <!-- Action Buttons for faster interaction -->
          <div class="message-buttons" *ngIf="msg.buttons && msg.buttons.length > 0">
            <button *ngFor="let btn of msg.buttons" 
                    (click)="quickAction(btn)"
                    class="action-btn">
              {{ btn }}
            </button>
          </div>
        </div>
        <span class="msg-time">{{ msg.timestamp | date:'shortTime' }}</span>
      </div>
    </div>

    <div class="quick-actions" *ngIf="(messages$ | async)?.length === 1">
      <button (click)="quickAction('How do I book a ride?')">🚗 Book a Ride</button>
      <button (click)="quickAction('How to use SOS?')">🚨 SOS Help</button>
      <button (click)="quickAction('Help with meals')">🍲 Meal Delivery</button>
    </div>

    <form class="chat-input" (submit)="sendMessage(); $event.preventDefault()">
      <button type="button" 
              class="mic-btn" 
              [class.listening]="isListening" 
              (click)="startVoiceInput()"
              [title]="isListening ? 'Listening...' : 'Start Voice Input'"
              aria-label="Voice Input">
        <span class="mic-icon">🎤</span>
        <span class="mic-pulse" *ngIf="isListening"></span>
      </button>
      <input type="text" 
             [(ngModel)]="userInput" 
             name="chatInput"
             placeholder="{{ isListening ? 'Listening...' : 'Type your question...' }}"
             autocomplete="off">
      <button type="submit" [disabled]="!userInput.trim()">
        <span>➤</span>
      </button>
    </form>
  </div>

  <!-- Trigger Button -->
  <button class="chat-trigger" (click)="toggleChat()" [class.hidden]="isOpen" aria-label="Open AI Assistant">
    <span class="pulse"></span>
    <img src="assets/images/ai-avatar-lady.png" alt="Assistant" class="trigger-avatar" width="60" height="60">
  </button>
</div>
