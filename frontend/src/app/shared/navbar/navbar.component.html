<header class="navbar">

  <!-- LOGO -->
  <a class="logo" routerLink="/home" aria-label="CareConnect Hub Home">
    <span class="logo-icon" role="img" aria-label="Caregiving Heart Icon">💙</span>
    CareConnect <span class="hub">Hub</span>
  </a>

  <!-- NAV LINKS -->
  <button class="mobile-toggle" (click)="toggleMenu()" [class.active]="menuOpen" aria-label="Toggle Navigation Menu">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <nav class="nav-links" [class.open]="menuOpen">
    <a routerLink="/home" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a>
    <a routerLink="/services" routerLinkActive="active" *ngIf="!isAdmin">Services</a>
    <a routerLink="/emergency" routerLinkActive="active" class="nav-emergency" *ngIf="!isAdmin">🚨 SOS Help</a>
    <a routerLink="/about" routerLinkActive="active" *ngIf="!isAdmin">About Us</a>
    <a routerLink="/dashboard" routerLinkActive="active" *ngIf="userName && !isAdmin">Dashboard</a>
    <a routerLink="/admin" routerLinkActive="active" *ngIf="isAdmin" style="color: #6366f1; font-weight: 700;">⚙️ Admin</a>
    
    <!-- Mobile-only A11y Controls -->
    <div class="mobile-a11y nav-mobile-only" *ngIf="showA11yControls">
      <div class="a11y-controls">
        <button class="a11y-btn" (click)="decreaseFont()" aria-label="Decrease Font Size">A-</button>
        <button class="a11y-btn" (click)="increaseFont()" aria-label="Increase Font Size">A+</button>
        <button class="a11y-btn" [class.active-mic]="voiceActive" (click)="toggleVoice()">
          {{ voiceActive ? '🎙️' : '🎤' }}
        </button>
        <button class="a11y-btn theme-toggle" (click)="toggleTheme()">
          {{ (currentTheme$ | async) === 'light' ? '🌙' : '☀️' }}
        </button>
      </div>
    </div>
  </nav>

  <!-- LOGIN / USER BUBBLE -->
  <div class="nav-right">
    <!-- Accessibility Controls (Hidden on mobile) -->
    <div class="a11y-controls nav-desktop-only" *ngIf="showA11yControls">
      <button class="a11y-btn" (click)="decreaseFont()" title="Decrease Font Size" aria-label="Decrease Font Size">A-</button>
      <button class="a11y-btn" (click)="increaseFont()" title="Increase Font Size" aria-label="Increase Font Size">A+</button>
      
      <!-- Voice Recognition Toggle -->
      <button class="a11y-btn" [class.active-mic]="voiceActive" 
              (click)="toggleVoice()" 
              [attr.title]="voiceActive ? 'Stop Voice Commands' : 'Start Voice Commands'"
              [attr.aria-label]="voiceActive ? 'Stop Voice Commands' : 'Start Voice Commands'">
        {{ voiceActive ? '🎙️' : '🎤' }}
      </button>

      <!-- Screen Reader (TTS) -->
      <button class="a11y-btn" (click)="handleReadToggle()"
              [attr.title]="isSpeaking ? 'Stop Reading' : 'Read Page Content'"
              [attr.aria-label]="isSpeaking ? 'Stop Reading' : 'Read Page Content'">
        {{ isSpeaking ? '🛑' : '🔊' }}
      </button>

      <button class="a11y-btn theme-toggle" (click)="toggleTheme()" 
              [attr.title]="(currentTheme$ | async) === 'light' ? 'Switch to Dark Mode' : 'Switch to Light Mode'"
              [attr.aria-label]="(currentTheme$ | async) === 'light' ? 'Switch to Dark Mode' : 'Switch to Light Mode'">
        {{ (currentTheme$ | async) === 'light' ? '🌙' : '☀️' }}
      </button>
    </div>

    <ng-container *ngIf="userName; else loginBtn">
      <a class="user-greeting" [routerLink]="isAdmin ? '/admin' : '/dashboard'" [attr.aria-label]="'Go to ' + (isAdmin ? 'Admin Panel' : 'Dashboard') + ' for ' + userName">
        <span class="avatar" aria-hidden="true">👤</span>
        <span class="user-name">{{ userName }}</span>
      </a>
      <button class="logout-btn" (click)="logout()">Logout</button>
    </ng-container>
    <ng-template #loginBtn>
      <button class="login-btn" routerLink="/auth">Login</button>
    </ng-template>
  </div>

</header>
